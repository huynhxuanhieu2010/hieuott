<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONNA Online - OTT App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- Video.js Library & CSS -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f141e;
            color: white;
            overflow-x: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .gradient-overlay {
            background: linear-gradient(to top, #0f141e 5%, rgba(15, 20, 30, 0.4) 40%, transparent 100%);
        }

        #main-header {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .header-transparent {
            background-color: transparent !important;
            border-bottom-color: transparent !important;
            backdrop-filter: none !important;
        }

        .header-scrolled {
            background-color: rgba(15, 20, 30, 0.9) !important;
            border-bottom-color: rgba(255, 255, 255, 0.05) !important;
            backdrop-filter: blur(15px) !important;
        }

        .channel-card-item {
            background-color: #1c222d;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
            transition: transform 0.2s ease, background-color 0.2s ease;
        }
        .channel-card-item:active { 
            transform: scale(0.96); 
            background-color: #252d3a;
        }

        .logo-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .movie-card-container {
            flex-shrink: 0;
            width: 140px;
            background-color: #1c222d;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            overflow: hidden;
            transition: transform 0.2s ease;
        }
        .movie-card-container:active {
            transform: scale(0.95);
        }

        .movie-poster-box {
            width: 100%;
            aspect-ratio: 2 / 3; 
            position: relative;
            overflow: hidden;
        }

        .movie-info-box {
            padding: 10px;
            background: #1c222d;
        }

        .header-nav-item.active { color: #10b981; font-weight: 700; }
        .header-nav-item.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background-color: #10b981;
        }

        #splash-screen {
            position: fixed;
            inset: 0;
            background-color: #0f141e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        
        .tab-button.active {
            background-color: rgba(16, 185, 129, 0.1);
            border-color: #10b981;
            color: #10b981;
        }

        .episode-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s;
        }
        .episode-btn.active {
            background: #10b981;
            border-color: #10b981;
            color: white;
        }

        #search-overlay {
            transition: all 0.3s ease;
            backdrop-filter: blur(20px);
            background: rgba(15, 20, 30, 0.95);
        }

        .epg-item {
            background: rgba(255, 255, 255, 0.03);
            border-left: 3px solid transparent;
        }
        .epg-item.playing {
            background: rgba(16, 185, 129, 0.1);
            border-left-color: #10b981;
        }

        /* Video.js Custom Styles */
        .video-container-wrapper {
            position: relative;
            width: 100%;
            background-color: #000;
        }
        .video-js {
            width: 100% !important;
            height: auto !important;
            aspect-ratio: 16/9;
        }
        .vjs-big-play-button {
            top: 50% !important;
            left: 50% !important;
            transform: translate(-50%, -50%) !important;
            border-radius: 50% !important;
            width: 60px !important;
            height: 60px !important;
            line-height: 60px !important;
            background-color: rgba(16, 185, 129, 0.8) !important;
            border: none !important;
        }
    </style>
</head>
<body class="pb-20 md:pb-0">

    <!-- Splash Screen -->
    <div id="splash-screen">
        <img src="https://i.postimg.cc/5NdWYRN5/onnaonlinetv.png" alt="Logo" style="width:160px; animation: pulse 2s infinite ease-in-out;">
    </div>

    <!-- Search Overlay -->
    <div id="search-overlay" class="fixed inset-0 z-[100] hidden flex flex-col p-6 overflow-y-auto">
        <div class="flex items-center gap-4 max-w-4xl mx-auto w-full mb-8">
            <div class="relative flex-1">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <input type="text" id="search-input" placeholder="Tìm tên phim, kênh truyền hình..." 
                    class="w-full bg-white/10 border border-white/10 rounded-full py-4 pl-12 pr-4 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 text-lg transition-all"
                    oninput="handleSearch(this.value)">
            </div>
            <button onclick="toggleSearch()" class="w-12 h-12 flex items-center justify-center bg-white/5 rounded-full hover:bg-white/10">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>

        <div id="search-results-container" class="max-w-4xl mx-auto w-full">
            <div id="search-status" class="text-center py-20 text-gray-500">
                <i class="fas fa-search text-6xl mb-4 block opacity-20"></i>
                <p>Nhập từ khóa để bắt đầu tìm kiếm</p>
            </div>
            
            <div id="search-results-content" class="space-y-8 hidden">
                <section id="results-channels-section" class="hidden">
                    <h3 class="text-gray-400 font-bold uppercase text-xs mb-4 tracking-widest">Kênh truyền hình</h3>
                    <div id="search-results-channels" class="grid grid-cols-2 sm:grid-cols-3 gap-4"></div>
                </section>

                <section id="results-movies-section" class="hidden">
                    <h3 class="text-gray-400 font-bold uppercase text-xs mb-4 tracking-widest">Phim & Series</h3>
                    <div id="search-results-movies" class="grid grid-cols-2 sm:grid-cols-4 gap-4"></div>
                </section>
            </div>
        </div>
    </div>

    <div id="app">
        <!-- Header -->
        <header id="main-header" class="fixed top-0 left-0 right-0 z-50 header-transparent border-b">
            <div class="flex items-center justify-between px-4 h-16 max-w-7xl mx-auto w-full">
                <div class="flex items-center gap-8">
                    <img src="https://i.postimg.cc/5NdWYRN5/onnaonlinetv.png" alt="Logo" class="h-7 cursor-pointer" onclick="showPage('home')">
                    <nav class="hidden md:flex items-center gap-6">
                        <button onclick="showPage('home')" class="header-nav-item active text-sm h-16 relative flex items-center px-1" id="h-nav-home">Trang chủ</button>
                        <button onclick="showPage('tv')" class="header-nav-item text-sm h-16 relative flex items-center px-1 text-gray-400" id="h-nav-tv">Truyền hình</button>
                        <button onclick="showPage('phim')" class="header-nav-item text-sm h-16 relative flex items-center px-1 text-gray-400" id="h-nav-phim">ONNA Phim</button>
                    </nav>
                </div>
                <div class="flex items-center gap-4">
                    <i onclick="toggleSearch()" class="fas fa-search text-lg cursor-pointer p-2 hover:bg-white/10 rounded-full transition-all"></i>
                    <button class="text-xs font-bold bg-emerald-500 px-5 py-2 rounded-full hidden sm:block">Đăng nhập</button>
                </div>
            </div>
        </header>

        <!-- Home Page -->
        <main id="home-page" class="page-content">
            <!-- Hero Banner -->
            <section class="relative w-full h-[60vh] sm:h-[80vh]">
                <img src="https://i.postimg.cc/59v0Ktpw/takopi_no_genzai_688e4acac925c4792d768d22.jpg" class="w-full h-full object-cover object-top" alt="Banner Phim">
                <div class="absolute inset-0 gradient-overlay flex flex-col justify-end p-6 pb-12 sm:pb-20 sm:px-12 max-w-7xl mx-auto w-full">
                    <span class="bg-emerald-600 text-[10px] font-bold px-3 py-1 rounded w-fit mb-3 uppercase tracking-wider">Gợi ý cho bạn</span>
                    <h1 class="text-3xl sm:text-5xl font-bold mb-3">Nguyên Tội của Takopi</h1>
                    <p class="text-gray-300 text-sm max-w-xl mb-6 line-clamp-2">Hành trình tìm lại hạnh phúc của một sinh vật ngoài hành tinh tại Trái Đất đầy khắc nghiệt.</p>
                    <button onclick="openMovieDetails(0)" class="bg-emerald-500 w-fit px-8 py-3 rounded-full font-bold flex items-center gap-2 hover:scale-105 active:scale-95 transition-all">
                        <i class="fas fa-info-circle"></i> Chi tiết
                    </button>
                </div>
            </section>

            <div class="space-y-10 px-4 sm:px-8 mt-6 pb-12 max-w-7xl mx-auto">
                <section>
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-lg font-bold uppercase flex items-center gap-2">
                            <i class="fas fa-tv text-emerald-500 text-sm"></i> Kênh trực tuyến
                        </h2>
                        <button onclick="showPage('tv')" class="text-xs text-emerald-500 font-bold">Xem tất cả <i class="fas fa-chevron-right ml-1"></i></button>
                    </div>
                    <div id="home-channel-list" class="flex gap-3 overflow-x-auto hide-scrollbar pb-2"></div>
                </section>

                <section>
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-lg font-bold uppercase flex items-center gap-2">
                            <i class="fas fa-film text-emerald-500 text-sm"></i> ONNA Phim hot
                        </h2>
                        <button onclick="showPage('phim')" class="text-xs text-emerald-500 font-bold">Xem tất cả <i class="fas fa-chevron-right ml-1"></i></button>
                    </div>
                    <div id="home-series-list" class="flex gap-4 overflow-x-auto hide-scrollbar pb-2"></div>
                </section>
            </div>
        </main>

        <!-- Movie Details Page -->
        <main id="details-page" class="page-content hidden min-h-screen bg-[#0f141e]">
            <div id="details-content"></div>
        </main>

        <!-- TV Page -->
        <main id="tv-page" class="page-content hidden min-h-screen pt-16">
            <div class="sticky top-16 z-30 bg-[#0f141e]">
                <div id="video-container" class="video-container-wrapper">
                    <video id="tv-player" class="video-js vjs-big-play-centered" controls preload="auto" playsinline>
                    </video>
                    <div id="player-loading" class="absolute inset-0 flex items-center justify-center bg-black/60 hidden z-10">
                        <i class="fas fa-circle-notch fa-spin text-2xl text-emerald-500"></i>
                    </div>
                </div>
                <div class="px-4 py-3 max-w-7xl mx-auto w-full">
                    <div class="bg-[#1c222d] p-1 rounded-xl flex gap-1 border border-white/5">
                        <button onclick="switchTvTab('content')" id="tab-btn-content" class="tab-button active flex-1 py-2 rounded-lg text-[10px] font-bold uppercase tracking-wider transition-all">Danh sách kênh</button>
                        <button onclick="switchTvTab('epg')" id="tab-btn-epg" class="tab-button flex-1 py-2 rounded-lg text-[10px] font-bold uppercase tracking-wider transition-all">Lịch phát sóng</button>
                    </div>
                </div>
            </div>
            <div id="tv-tab-content" class="px-4 pb-32 max-w-7xl mx-auto w-full">
                <div id="tv-content-view">
                    <div id="category-chips" class="flex gap-2 overflow-x-auto hide-scrollbar py-3"></div>
                    <div id="tv-channel-list" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 py-2"></div>
                </div>
                <div id="tv-epg-view" class="hidden py-4 space-y-3">
                    <div id="epg-channel-header" class="flex items-center gap-3 mb-4">
                        <div class="w-10 h-10 bg-black rounded flex items-center justify-center overflow-hidden">
                            <img id="epg-current-logo" src="" class="w-8" alt="">
                        </div>
                        <div>
                            <h3 id="epg-current-name" class="text-sm font-bold text-white">Chưa chọn kênh</h3>
                            <p class="text-[10px] text-gray-500 font-bold uppercase tracking-tighter">Lịch phát sóng hôm nay</p>
                        </div>
                    </div>
                    <div id="epg-list" class="space-y-2"></div>
                </div>
            </div>
        </main>

        <!-- Phim Page -->
        <main id="phim-page" class="page-content hidden min-h-screen">
            <section class="relative w-full h-[50vh] sm:h-[60vh]">
                <img src="https://images.unsplash.com/photo-1574267432553-4b4628081c31?auto=format&fit=crop&w=1200&q=80" class="w-full h-full object-cover" alt="Banner">
                <div class="absolute inset-0 gradient-overlay flex flex-col justify-end p-6 pb-12 max-w-7xl mx-auto w-full">
                    <h1 class="text-3xl font-bold mb-2">ONNA Phim</h1>
                </div>
            </section>

            <div class="px-4 sm:px-8 mt-4 max-w-7xl mx-auto w-full pb-32 space-y-10">
                <section>
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-lg font-bold uppercase flex items-center gap-2">
                            <i class="fas fa-fire text-orange-500 text-sm"></i> Phim mới nhất
                        </h2>
                    </div>
                    <div id="phim-latest-list" class="flex gap-4 overflow-x-auto hide-scrollbar pb-2"></div>
                </section>
            </div>
        </main>

        <!-- Bottom Navigation -->
        <nav id="bottom-nav" class="md:hidden fixed bottom-0 left-0 right-0 bg-[#0f141e]/95 backdrop-blur-xl border-t border-white/5 flex justify-around items-center py-2 z-40">
            <button onclick="showPage('home')" class="nav-item active flex flex-col items-center gap-1 text-emerald-500" id="nav-home">
                <i class="fas fa-home text-lg"></i>
                <span class="text-[9px] font-bold">Trang chủ</span>
            </button>
            <button onclick="showPage('tv')" class="nav-item flex flex-col items-center gap-1 text-gray-500" id="nav-tv">
                <i class="fas fa-tv text-lg"></i>
                <span class="text-[9px] font-bold">Truyền hình</span>
            </button>
            <button onclick="showPage('phim')" class="nav-item flex flex-col items-center gap-1 text-gray-500" id="nav-phim">
                <i class="fas fa-film text-lg"></i>
                <span class="text-[9px] font-bold">ONNA Phim</span>
            </button>
            <button class="flex flex-col items-center gap-1 text-gray-500">
                <i class="fas fa-user text-lg"></i>
                <span class="text-[9px] font-bold">Của tôi</span>
            </button>
        </nav>
    </div>

    <script>
        const channels = [
            { id: 1, name: 'ONi1 HD', cat: 'Giải trí', logo: 'https://i.postimg.cc/rwJfnXwz/oni1.png', url: 'https://bitdash-a.akamaihd.net/content/MI201109210084_1/m3u8s/f08e80da-bf1d-4e3d-8899-f0f6155f6efa.m3u8' },
            { id: 2, name: 'ONi2', cat: 'Âm nhạc', logo: 'https://i.postimg.cc/8zJCwDHY/oni2.png', url: 'https://onnanetwork.xyz/live.qphim.xyz:8880/hls_nonkey/oni2/index.m3u8' },
            { id: 3, name: 'ONi3', cat: 'Giải trí', logo: 'https://i.postimg.cc/zXMhqx2F/oni3.png', url: 'https://onnanetwork.xyz/live.qphim.xyz:8880/hls_nonkey/oni3/index.m3u8' },
            { id: 4, name: 'ONi4 HD', cat: 'Thể thao', logo: 'https://i.postimg.cc/PrcDdSVz/oni4.png', url: 'https://onnanetwork.xyz/live.qphim.xyz:8880/hls_nonkey/oni4/index.m3u8' },
            { id: 5, name: 'MBN Enter HD', cat: 'Giải trí', logo: 'https://i.postimg.cc/hPwmK2Zr/oni5.png', url: 'https://onnanetwork.xyz/live.qphim.xyz:8880/hls_nonkey/oni5/index.m3u8' },
            { id: 6, name: 'ONi6', cat: 'Tổng hợp', logo: 'https://i.postimg.cc/SN59mg1G/oni6.png', url: 'https://onnanetwork.xyz/live.qphim.xyz:8880/hls_nonkey/oni6/index.m3u8' },
            { id: 7, name: 'ONi7 HD', cat: 'Thể thao', logo: 'https://i.postimg.cc/ZKgNJwss/oni7.png', url: 'https://onnanetwork.xyz/live.qphim.xyz:8880/hls_nonkey/oni7/index.m3u8' }
        ];

        const series = [
            { 
                id: 0, 
                title: 'Nguyên Tội của Takopi', 
                ep: '6 Tập', 
                img: 'https://i.postimg.cc/59v0Ktpw/takopi_no_genzai_688e4acac925c4792d768d22.jpg',
                desc: 'Một câu chuyện cảm động và đôi khi ám ảnh về tình bạn và nỗ lực mang lại nụ cười cho ai đó.',
                total_ep: 6,
                tags: ['Anime', 'Tâm lý'],
                episode_urls: { 1: 'https://bitdash-a.akamaihd.net/content/MI201109210084_1/m3u8s/f08e80da-bf1d-4e3d-8899-f0f6155f6efa.m3u8' }
            }
        ];

        let player = null; 
        let currentChannel = null;

        window.onload = () => {
            initVideoPlayer();
            renderContent();
            
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                splash.style.opacity = '0';
                setTimeout(() => splash.style.display = 'none', 500);
            }, 1000);
        };

        function initVideoPlayer() {
            // Khởi tạo Video.js với hỗ trợ HLS mặc định trong bản v8
            player = videojs('tv-player', {
                fluid: true,
                autoplay: false,
                controls: true,
                preload: 'auto',
                html5: {
                    vhs: { overrideNative: true },
                    nativeAudioTracks: false,
                    nativeVideoTracks: false
                }
            });

            player.on('error', function() {
                const error = player.error();
                console.error('VideoJS Error:', error);
                document.getElementById('player-loading').classList.add('hidden');
            });

            player.on('waiting', () => document.getElementById('player-loading').classList.remove('hidden'));
            player.on('playing', () => document.getElementById('player-loading').classList.add('hidden'));
        }

        function playChannel(channel) {
            currentChannel = channel;
            showPage('tv');
            
            document.getElementById('epg-current-logo').src = channel.logo;
            document.getElementById('epg-current-name').innerText = channel.name;

            const videoType = channel.url.includes('.m3u8') ? 'application/x-mpegURL' : 'video/mp4';
            
            if (player) {
                player.src({ src: channel.url, type: videoType });
                player.poster(channel.logo);
                player.play().catch(e => console.log("Yêu cầu tương tác người dùng để phát video."));
            }

            document.getElementById('video-container').scrollIntoView({ behavior: 'smooth' });
        }

        function showPage(pageId) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden'));
            document.getElementById(`${pageId}-page`).classList.remove('hidden');
            
            // Cập nhật Navigation UI
            document.querySelectorAll('.nav-item').forEach(n => n.classList.replace('text-emerald-500', 'text-gray-500'));
            const activeNav = document.getElementById(`nav-${pageId}`);
            if (activeNav) activeNav.classList.replace('text-gray-500', 'text-emerald-500');

            if (pageId !== 'tv') {
                if(player) player.pause();
            }
            window.scrollTo(0,0);
        }

        function renderContent() {
            const list = document.getElementById('home-channel-list');
            list.innerHTML = channels.map(ch => `
                <div onclick='playChannel(${JSON.stringify(ch)})' class="channel-card-item w-[140px] flex-shrink-0 cursor-pointer">
                    <div class="logo-container"><img src="${ch.logo}" alt="${ch.name}"></div>
                    <div class="p-2">
                        <h4 class="text-[11px] font-bold truncate">${ch.name}</h4>
                        <p class="text-[9px] text-gray-500 font-bold uppercase">${ch.cat}</p>
                    </div>
                </div>
            `).join('');

            document.getElementById('tv-channel-list').innerHTML = channels.map(ch => `
                <div onclick='playChannel(${JSON.stringify(ch)})' class="channel-card-item w-full cursor-pointer">
                    <div class="logo-container"><img src="${ch.logo}" alt="${ch.name}"></div>
                    <div class="p-2">
                        <h4 class="text-[11px] font-bold truncate">${ch.name}</h4>
                        <p class="text-[9px] text-gray-500 font-bold uppercase">${ch.cat}</p>
                    </div>
                </div>
            `).join('');
            
            renderCategoryChips();
        }

        function renderCategoryChips() {
            const cats = ["Tất cả", "Thể thao", "Giải trí", "Âm nhạc", "Phim", "Tổng hợp"];
            document.getElementById('category-chips').innerHTML = cats.map(c => `
                <button class="flex-shrink-0 px-4 py-1 rounded-full text-[10px] font-bold border border-white/10 bg-white/5 text-gray-400">${c}</button>
            `).join('');
        }

        function switchTvTab(tab) {
            document.getElementById('tv-content-view').classList.toggle('hidden', tab !== 'content');
            document.getElementById('tv-epg-view').classList.toggle('hidden', tab !== 'epg');
            document.getElementById('tab-btn-content').classList.toggle('active', tab === 'content');
            document.getElementById('tab-btn-epg').classList.toggle('active', tab === 'epg');
        }

        function toggleSearch() {
            const overlay = document.getElementById('search-overlay');
            overlay.classList.toggle('hidden');
        }

        function openMovieDetails(id) {
            // Mock function for demo
            alert("Chi tiết phim ID: " + id);
        }
    </script>
</body>
</html>
